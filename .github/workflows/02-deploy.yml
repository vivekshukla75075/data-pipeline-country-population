name: 2. Deploy to AWS

on:
  push:
    branches:
      - main
      - master
      - feature/*
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: false
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod
      aws_region:
        description: "AWS region"
        required: false
        default: "us-east-1"

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ github.event.inputs.aws_region || 'us-east-1' }}
  ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
  STACK_NAME: data-pipeline-orchestration
  NOTIFICATION_EMAIL: ntvs02011999@gmail.com
  AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

jobs:
  deploy:
    name: Deploy Pipeline Infrastructure
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml boto3

      - name: Resolve AWS auth mode
        id: aws-auth
        shell: bash
        run: |
          if [ -n "${AWS_ROLE_ARN}" ]; then
            echo "using_oidc=true" >> "$GITHUB_OUTPUT"
          elif [ -n "${AWS_ACCESS_KEY_ID}" ] && [ -n "${AWS_SECRET_ACCESS_KEY}" ]; then
            echo "using_oidc=false" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Set AWS_ROLE_ARN for OIDC deployment or provide AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY."
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        if: ${{ steps.aws-auth.outputs.using_oidc == 'true' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: github-actions-deploy-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials (Access Keys)
        if: ${{ steps.aws-auth.outputs.using_oidc != 'true' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate AWS credentials
        run: aws sts get-caller-identity

      - name: Validate CloudFormation template
        run: |
          set -euo pipefail
          echo "Checking CloudFormation deployment permissions..."
          echo "AWS_ROLE_ARN=${AWS_ROLE_ARN}"
          aws sts get-caller-identity --query Arn --output text

          if [ -n "${AWS_ROLE_ARN}" ]; then
            echo "Using assumed role for deployment. Ensure that role has CloudFormation permissions."
          else
            echo "Using access key credentials. Validating CloudFormation permissions now."
          fi

          if aws cloudformation validate-template \
            --template-body file://infra/cloudformation/orchestration.yaml \
            --region "${AWS_REGION}" >/dev/null; then
            echo "✓ CloudFormation template validated"
          else
            echo "✗ CloudFormation template validation failed"
            exit 1
          fi

      - name: Build Lambda packages
        run: |
          cd lambda_deployment
          rm -f ingest_api_data.zip notify_pipeline_status.zip
          zip -q ingest_api_data.zip ingest_api_data.py ../utils/http_utils.py
          zip -q notify_pipeline_status.zip notify_pipeline_status.py
          ls -lh *.zip
          cd ..
          echo "✓ Lambda packages ready"

      - name: Deploy CloudFormation stack
        run: |
          echo "Deploying stack: $STACK_NAME to region: $AWS_REGION"
          aws cloudformation deploy \
            --template-file infra/cloudformation/orchestration.yaml \
            --stack-name "$STACK_NAME" \
            --parameter-overrides Environment="${ENVIRONMENT}" NotificationEmail="${NOTIFICATION_EMAIL}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --region "$AWS_REGION" \
            --no-fail-on-empty-changeset
          echo "✓ CloudFormation stack deployed"

      - name: Deploy ingestion Lambda
        run: |
          cd lambda_deployment
          FUNCTION_NAME="ingest-api-data"
          if aws lambda get-function --function-name "$FUNCTION_NAME" --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "Updating existing Lambda function: $FUNCTION_NAME"
            aws lambda update-function-code \
              --function-name "$FUNCTION_NAME" \
              --zip-file fileb://ingest_api_data.zip \
              --region "$AWS_REGION"
          else
            echo "Lambda function will be created by CloudFormation"
          fi

      - name: Deploy notifier Lambda
        run: |
          cd lambda_deployment
          FUNCTION_NAME="pipeline-status-notifier"
          if aws lambda get-function --function-name "$FUNCTION_NAME" --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "Updating existing Lambda function: $FUNCTION_NAME"
            aws lambda update-function-code \
              --function-name "$FUNCTION_NAME" \
              --zip-file fileb://notify_pipeline_status.zip \
              --region "$AWS_REGION"
          else
            echo "Lambda function will be created by CloudFormation"
          fi

      - name: Verify deployment
        run: |
          aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --query 'Stacks[0].StackStatus' \
            --output text

      - name: Deployment summary
        if: success()
        run: |
          echo "✓ DEPLOYMENT SUCCESSFUL"
          echo "Stack Name: $STACK_NAME"
          echo "Region: $AWS_REGION"
          echo "Environment: $ENVIRONMENT"

      - name: Deployment failed
        if: failure()
        run: |
          echo "✗ DEPLOYMENT FAILED"
          echo "CloudFormation stack events for ${STACK_NAME}:"
          aws cloudformation describe-stack-events \
            --stack-name "${STACK_NAME}" \
            --region "${AWS_REGION}" \
            --query 'StackEvents[?contains(ResourceStatus, `FAILED`) || contains(ResourceStatus, `ROLLBACK`) || contains(ResourceStatus, `CREATE_FAILED`) || contains(ResourceStatus, `DELETE_FAILED`) || contains(ResourceStatus, `UPDATE_ROLLBACK`)].[Timestamp,ResourceStatus,ResourceType,LogicalResourceId,ResourceStatusReason]' \
            --output table || true
          exit 1