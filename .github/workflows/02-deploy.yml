name: 2. Deploy to AWS

on:
  push:
    branches:
      - main
      - master
      - feature/*
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: false
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod
      aws_region:
        description: "AWS region"
        required: false
        default: "us-east-1"

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ github.event.inputs.aws_region || 'us-east-1' }}
  ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
  STACK_NAME: data-pipeline-orchestration
  NOTIFICATION_EMAIL: ntvs02011999@gmail.com
  AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

jobs:
  deploy:
    name: Deploy Pipeline Infrastructure
    runs-on: ubuntu-latest
    if: ${{ !(github.event_name == 'push' && github.actor == 'github-actions') }}
    environment:
      name: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml boto3

      - name: Resolve AWS auth mode
        id: aws-auth
        shell: bash
        run: |
          if [ -n "${AWS_ROLE_ARN}" ]; then
            echo "using_oidc=true" >> "$GITHUB_OUTPUT"
          elif [ -n "${AWS_ACCESS_KEY_ID}" ] && [ -n "${AWS_SECRET_ACCESS_KEY}" ]; then
            echo "using_oidc=false" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Set AWS_ROLE_ARN for OIDC deployment or provide AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY."
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        if: ${{ steps.aws-auth.outputs.using_oidc == 'true' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: github-actions-deploy-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials (Access Keys)
        if: ${{ steps.aws-auth.outputs.using_oidc != 'true' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate AWS credentials
        run: aws sts get-caller-identity

      - name: Validate CloudFormation template
        run: |
          set -euo pipefail
          echo "Checking CloudFormation deployment permissions..."
          echo "AWS_ROLE_ARN=${AWS_ROLE_ARN}"
          aws sts get-caller-identity --query Arn --output text

          if [ -n "${AWS_ROLE_ARN}" ]; then
            echo "Using assumed role for deployment. Ensure that role has CloudFormation permissions."
          else
            echo "Using access key credentials. Validating CloudFormation permissions now."
          fi

          if aws cloudformation validate-template \
            --template-body file://infra/cloudformation/orchestration.yaml \
            --region "${AWS_REGION}" >/dev/null; then
            echo "✓ CloudFormation template validated"
          else
            echo "✗ CloudFormation template validation failed"
            exit 1
          fi

      - name: Build Lambda packages
        run: |
          cd lambda_deployment
          rm -f ingest_api_data.zip notify_pipeline_status.zip
          zip -q ingest_api_data.zip ingest_api_data.py ../utils/http_utils.py
          zip -q notify_pipeline_status.zip notify_pipeline_status.py
          ls -lh *.zip
          cd ..
          echo "✓ Lambda packages ready"

      - name: Deploy CloudFormation stack
        run: |
          set -euo pipefail
          echo "Checking current stack state for $STACK_NAME"

          if aws cloudformation describe-stacks --stack-name "$STACK_NAME" --region "$AWS_REGION" >/dev/null 2>&1; then
            STACK_STATUS=$(aws cloudformation describe-stacks \
              --stack-name "$STACK_NAME" \
              --region "$AWS_REGION" \
              --query 'Stacks[0].StackStatus' \
              --output text 2>/dev/null || true)
            echo "Current stack status: ${STACK_STATUS:-unknown}"

            if [ "$STACK_STATUS" = "ROLLBACK_COMPLETE" ] || [ "$STACK_STATUS" = "CREATE_FAILED" ] || [ "$STACK_STATUS" = "DELETE_FAILED" ] || [ "$STACK_STATUS" = "UPDATE_ROLLBACK_COMPLETE" ] || [ "$STACK_STATUS" = "UPDATE_ROLLBACK_FAILED" ]; then
              echo "Deleting failed/rollback stack so deployment can proceed"
              aws cloudformation delete-stack --stack-name "$STACK_NAME" --region "$AWS_REGION"
              aws cloudformation wait stack-delete-complete --stack-name "$STACK_NAME" --region "$AWS_REGION" || true
            fi
          fi

          echo "Deploying stack: $STACK_NAME to region: $AWS_REGION"
          aws cloudformation deploy \
            --template-file infra/cloudformation/orchestration.yaml \
            --stack-name "$STACK_NAME" \
            --parameter-overrides Environment="${ENVIRONMENT}" NotificationEmail="${NOTIFICATION_EMAIL}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --region "$AWS_REGION" \
            --no-fail-on-empty-changeset
          echo "✓ CloudFormation stack deployed"

          # Fetch Lambda names
          IngestionLambdaName=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --region "$AWS_REGION" --query 'Stacks[0].Parameters[?ParameterKey==`IngestionLambdaName`].ParameterValue | [0]' --output text 2>/dev/null || echo "")
          if [ -z "$IngestionLambdaName" ] || [ "$IngestionLambdaName" = "None" ]; then
            IngestionLambdaName="ingest-api-data"
          fi

          NotificationLambdaName=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --region "$AWS_REGION" --query 'Stacks[0].Parameters[?ParameterKey==`NotificationLambdaName`].ParameterValue | [0]' --output text 2>/dev/null || echo "")
          if [ -z "$NotificationLambdaName" ] || [ "$NotificationLambdaName" = "None" ]; then
            NotificationLambdaName="pipeline-status-notifier"
          fi

          # If the stack created a customer-managed KMS key, set the existing Lambdas to use it
          PIPELINE_KMS_ARN=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --query 'Stacks[0].Outputs[?OutputKey==`PipelineKmsKeyArn`].OutputValue | [0]' \
            --output text 2>/dev/null || true)

          if [ -n "$PIPELINE_KMS_ARN" ] && [ "$PIPELINE_KMS_ARN" != "None" ]; then
            echo "Updating existing Lambdas to use pipeline KMS key: $PIPELINE_KMS_ARN"
            echo "Setting KmsKeyArn for $IngestionLambdaName to $PIPELINE_KMS_ARN"
            aws lambda update-function-configuration --function-name "$IngestionLambdaName" --kms-key-arn "$PIPELINE_KMS_ARN" --region "$AWS_REGION" || true
            echo "Setting KmsKeyArn for $NotificationLambdaName to $PIPELINE_KMS_ARN"
            aws lambda update-function-configuration --function-name "$NotificationLambdaName" --kms-key-arn "$PIPELINE_KMS_ARN" --region "$AWS_REGION" || true
          else
            echo "No pipeline-managed KMS key in stack outputs; clearing Lambda KMS associations to use default encryption"
            echo "Clearing KmsKeyArn for $IngestionLambdaName"
            aws lambda update-function-configuration --function-name "$IngestionLambdaName" --kms-key-arn "" --region "$AWS_REGION" 2>&1 | grep -q "InvalidParameterValueException" && echo "(Ignoring: Lambda may already have no KMS key set)" || true
            echo "Clearing KmsKeyArn for $NotificationLambdaName"
            aws lambda update-function-configuration --function-name "$NotificationLambdaName" --kms-key-arn "" --region "$AWS_REGION" 2>&1 | grep -q "InvalidParameterValueException" && echo "(Ignoring: Lambda may already have no KMS key set)" || true
          fi

      - name: Upload Glue scripts and bootstrap S3 folders
        run: |
          set -euo pipefail
          echo "Loading S3 bucket and Glue role outputs"
          DATA_BUCKET_NAME=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --query 'Stacks[0].Outputs[?OutputKey==`DataBucketName`].OutputValue | [0]' \
            --output text)
          GLUE_ROLE_ARN=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --query 'Stacks[0].Outputs[?OutputKey==`GlueJobRoleArn`].OutputValue | [0]' \
            --output text)

          if [ -z "$DATA_BUCKET_NAME" ] || [ -z "$GLUE_ROLE_ARN" ]; then
            echo "ERROR: Missing CloudFormation outputs. DataBucketName=$DATA_BUCKET_NAME GlueJobRoleArn=$GLUE_ROLE_ARN"
            exit 1
          fi

          echo "Uploading Glue scripts to s3://$DATA_BUCKET_NAME/scripts/"
          aws s3 cp Validation/validate_schema.py s3://$DATA_BUCKET_NAME/scripts/
          aws s3 cp Transformation/intermediate_transform.py s3://$DATA_BUCKET_NAME/scripts/
          aws s3 cp Transformation/transform_data.py s3://$DATA_BUCKET_NAME/scripts/

          echo "Bootstrapping folder prefixes for pipeline zones"
          touch /tmp/.keep
          aws s3api put-object --bucket "$DATA_BUCKET_NAME" --key raw/countries/.keep --body /tmp/.keep
          aws s3api put-object --bucket "$DATA_BUCKET_NAME" --key validated/countries/.keep --body /tmp/.keep
          aws s3api put-object --bucket "$DATA_BUCKET_NAME" --key intermediate/countries/.keep --body /tmp/.keep
          aws s3api put-object --bucket "$DATA_BUCKET_NAME" --key curated/countries/.keep --body /tmp/.keep
          aws s3api put-object --bucket "$DATA_BUCKET_NAME" --key archive/countries/.keep --body /tmp/.keep
          aws s3api put-object --bucket "$DATA_BUCKET_NAME" --key scripts/.keep --body /tmp/.keep

          create_or_update_glue_job() {
            local JOB_NAME="$1"
            local SCRIPT_LOCATION="$2"
            local WORKER_TYPE="$3"
            local NUM_WORKERS="$4"
            local DEFAULT_ARGUMENTS="$5"

            if aws glue get-job --job-name "$JOB_NAME" --region "$AWS_REGION" >/dev/null 2>&1; then
              echo "Updating Glue job: $JOB_NAME"
              JOB_UPDATE_JSON="{\"Role\":\"$GLUE_ROLE_ARN\",\"Command\":{\"Name\":\"glueetl\",\"ScriptLocation\":\"$SCRIPT_LOCATION\"},\"DefaultArguments\":$DEFAULT_ARGUMENTS,\"GlueVersion\":\"3.0\",\"WorkerType\":\"$WORKER_TYPE\",\"NumberOfWorkers\":$NUM_WORKERS,\"Timeout\":60}"
              aws glue update-job --job-name "$JOB_NAME" --job-update "$JOB_UPDATE_JSON" --region "$AWS_REGION"
            else
              echo "Creating Glue job: $JOB_NAME"
              aws glue create-job \
                --name "$JOB_NAME" \
                --role "$GLUE_ROLE_ARN" \
                --command Name=glueetl,ScriptLocation="$SCRIPT_LOCATION" \
                --glue-version 3.0 \
                --worker-type "$WORKER_TYPE" \
                --number-of-workers "$NUM_WORKERS" \
                --timeout 60 \
                --default-arguments "$DEFAULT_ARGUMENTS" \
                --region "$AWS_REGION"
            fi
          }

          VALIDATION_ARGS='{"--bucket_name":"'$DATA_BUCKET_NAME'","--raw_zone":"raw/countries","--validated_zone":"validated/countries","--archive_zone":"archive/countries"}'
          INTERMEDIATE_ARGS='{"--bucket_name":"'$DATA_BUCKET_NAME'","--validated_zone":"validated/countries","--intermediate_zone":"intermediate/countries"}'
          TRANSFORMATION_ARGS='{"--bucket_name":"'$DATA_BUCKET_NAME'","--intermediate_zone":"intermediate/countries","--curated_zone":"curated/countries"}'

          create_or_update_glue_job "country-population-validation" "s3://$DATA_BUCKET_NAME/scripts/validate_schema.py" "G.1X" 3 "$VALIDATION_ARGS"
          create_or_update_glue_job "country-population-intermediate" "s3://$DATA_BUCKET_NAME/scripts/intermediate_transform.py" "G.1X" 3 "$INTERMEDIATE_ARGS"
          create_or_update_glue_job "country-population-transformation" "s3://$DATA_BUCKET_NAME/scripts/transform_data.py" "G.1X" 5 "$TRANSFORMATION_ARGS"

          echo "Ensuring Lambda KMS key policy allows decrypt for Lambda roles"
          # Determine ingestion lambda name (try stack parameter, fallback to default)
          IngestionLambdaName=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --region "$AWS_REGION" --query 'Stacks[0].Parameters[?ParameterKey==`IngestionLambdaName`].ParameterValue | [0]' --output text 2>/dev/null || echo "")
          if [ -z "$IngestionLambdaName" ] || [ "$IngestionLambdaName" = "None" ]; then
            IngestionLambdaName="ingest-api-data"
          fi

          echo "Inspecting ingestion Lambda configuration: $IngestionLambdaName"
          aws lambda get-function-configuration --function-name "$IngestionLambdaName" --region "$AWS_REGION" --output json || true

          INGESTION_KMS_ARN=$(aws lambda get-function-configuration --function-name "$IngestionLambdaName" --region "$AWS_REGION" --query 'KMSKeyArn' --output text 2>/dev/null || true)
          INGESTION_KMS_ARN=${INGESTION_KMS_ARN//[$'\r\n']/}

          candidate_keys=()
          if [ -n "$INGESTION_KMS_ARN" ] && [ "$INGESTION_KMS_ARN" != "None" ]; then
            candidate_keys+=("$(echo "$INGESTION_KMS_ARN" | awk -F'/' '{print $NF}')")
          fi
          candidate_keys+=("${LAMBDA_KMS_KEY_ID:-be41d7eb-e179-4416-af91-8985db05d80e}")
          candidate_keys+=("${LAMBDA_KMS_KEY_ID_LEGACY:-be41d7eb-e179-4416-af91-8985db05d80}")

          KEY_ID=""
          for candidate_key in "${candidate_keys[@]}"; do
            if [ -z "$candidate_key" ]; then
              continue
            fi
            echo "Checking candidate KMS key: $candidate_key"
            if aws kms describe-key --key-id "$candidate_key" --region "$AWS_REGION" >/dev/null 2>&1; then
              KEY_ID="$candidate_key"
              break
            fi
          done

          if [ -n "$KEY_ID" ]; then
            echo "Using KMS key for ingestion Lambda: $KEY_ID"
            INGESTION_ROLE_ARN=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --region "$AWS_REGION" --query 'Stacks[0].Outputs[?OutputKey==`IngestionLambdaRoleArn`].OutputValue | [0]' --output text)
            NOTIFIER_ROLE_ARN=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --region "$AWS_REGION" --query 'Stacks[0].Outputs[?OutputKey==`NotificationLambdaRoleArn`].OutputValue | [0]' --output text)

            echo "Modifying key policy for $KEY_ID to allow roles: $INGESTION_ROLE_ARN $NOTIFIER_ROLE_ARN"
            export INGESTION_ROLE_ARN="$INGESTION_ROLE_ARN"
            export NOTIFIER_ROLE_ARN="$NOTIFIER_ROLE_ARN"
            aws kms get-key-policy --key-id "$KEY_ID" --policy-name default --query Policy --output text > /tmp/key_policy.json
            python3 scripts/update_kms_policy.py
            aws kms put-key-policy --key-id "$KEY_ID" --policy-name default --policy file:///tmp/key_policy_new.json
          else
            echo "No usable KMS key found for ingestion Lambda; skipping KMS policy update and leaving current Lambda configuration unchanged"
          fi

      - name: Deploy Lambda functions and invoke permissions
        run: |
          set -euo pipefail
          cd lambda_deployment

          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          STATE_MACHINE_ARN=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --query 'Stacks[0].Outputs[?OutputKey==`StateMachineArn`].OutputValue | [0]' \
            --output text)
          DATA_BUCKET_NAME=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --query 'Stacks[0].Outputs[?OutputKey==`DataBucketName`].OutputValue | [0]' \
            --output text)
          NOTIFICATION_QUEUE_URL=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --query 'Stacks[0].Outputs[?OutputKey==`NotificationQueueUrl`].OutputValue | [0]' \
            --output text)
          NOTIFICATION_TOPIC_ARN=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --query 'Stacks[0].Outputs[?OutputKey==`NotificationTopicArn`].OutputValue | [0]' \
            --output text)
          PIPELINE_KMS_ARN=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --query 'Stacks[0].Outputs[?OutputKey==`PipelineKmsKeyArn`].OutputValue | [0]' \
            --output text 2>/dev/null || true)
          PIPELINE_KMS_ARN=${PIPELINE_KMS_ARN//[$'\r\n']/}

          wait_for_lambda_ready() {
            local FUNCTION_NAME="$1"
            local attempt=0
            while true; do
              local state
              local last_update_status
              state=$(aws lambda get-function-configuration \
                --function-name "$FUNCTION_NAME" \
                --region "$AWS_REGION" \
                --query 'State' --output text 2>/dev/null || echo "Unknown")
              last_update_status=$(aws lambda get-function-configuration \
                --function-name "$FUNCTION_NAME" \
                --region "$AWS_REGION" \
                --query 'LastUpdateStatus' --output text 2>/dev/null || echo "Unknown")

              if [ "$state" = "Active" ] && [ "$last_update_status" != "InProgress" ] && [ "$last_update_status" != "Failed" ]; then
                break
              fi

              attempt=$((attempt + 1))
              if [ "$attempt" -ge 30 ]; then
                echo "ERROR: Lambda function $FUNCTION_NAME is not ready after 150 seconds (state=$state, last_update_status=$last_update_status)"
                exit 1
              fi

              echo "Waiting for Lambda $FUNCTION_NAME to become ready (state=$state, last_update_status=$last_update_status)..."
              sleep 5
            done
          }

          set_lambda_kms_key() {
            local FUNCTION_NAME="$1"
            local KMS_KEY_ARN="$2"

            if [ -n "$KMS_KEY_ARN" ] && [ "$KMS_KEY_ARN" != "None" ]; then
              aws lambda update-function-configuration \
                --function-name "$FUNCTION_NAME" \
                --kms-key-arn "$KMS_KEY_ARN" \
                --region "$AWS_REGION" >/dev/null 2>&1 || true
            else
              aws lambda update-function-configuration \
                --function-name "$FUNCTION_NAME" \
                --kms-key-arn "" \
                --region "$AWS_REGION" >/dev/null 2>&1 || true
            fi
          }

          deploy_lambda() {
            local FUNCTION_NAME="$1"
            local HANDLER="$2"
            local ZIP_FILE="$3"
            local ROLE_NAME="$4"
            local ROLE_ARN="arn:aws:iam::${ACCOUNT_ID}:role/${ROLE_NAME}"
            local ENV_VARS="$5"

            if aws lambda get-function --function-name "$FUNCTION_NAME" --region "$AWS_REGION" >/dev/null 2>&1; then
              echo "Updating existing Lambda function: $FUNCTION_NAME"
              wait_for_lambda_ready "$FUNCTION_NAME"
              aws lambda update-function-code \
                --function-name "$FUNCTION_NAME" \
                --zip-file "fileb://${ZIP_FILE}" \
                --region "$AWS_REGION" >/dev/null
              wait_for_lambda_ready "$FUNCTION_NAME"
              aws lambda update-function-configuration \
                --function-name "$FUNCTION_NAME" \
                --role "$ROLE_ARN" \
                --handler "$HANDLER" \
                --runtime python3.11 \
                --timeout 60 \
                --memory-size 128 \
                --environment "$ENV_VARS" \
                --region "$AWS_REGION" >/dev/null
            else
              echo "Creating Lambda function: $FUNCTION_NAME"
              aws lambda create-function \
                --function-name "$FUNCTION_NAME" \
                --runtime python3.11 \
                --role "$ROLE_ARN" \
                --handler "$HANDLER" \
                --zip-file "fileb://${ZIP_FILE}" \
                --timeout 60 \
                --memory-size 128 \
                --environment "$ENV_VARS" \
                --region "$AWS_REGION" >/dev/null
            fi

            wait_for_lambda_ready "$FUNCTION_NAME"
            set_lambda_kms_key "$FUNCTION_NAME" "$PIPELINE_KMS_ARN"
            aws lambda add-permission \
              --function-name "$FUNCTION_NAME" \
              --statement-id "AllowStateMachineInvoke" \
              --action lambda:InvokeFunction \
              --principal states.amazonaws.com \
              --source-arn "$STATE_MACHINE_ARN" \
              --region "$AWS_REGION" >/dev/null 2>&1 || true
          }

          deploy_lambda "ingest-api-data" "ingest_api_data.lambda_handler" "ingest_api_data.zip" "data-pipeline-ingestion-role-${ENVIRONMENT}" "Variables={BUCKET_NAME=${DATA_BUCKET_NAME},RAW_ZONE=raw/countries}"
          deploy_lambda "pipeline-status-notifier" "notify_pipeline_status.lambda_handler" "notify_pipeline_status.zip" "data-pipeline-notifier-role-${ENVIRONMENT}" "Variables={NOTIFICATION_QUEUE_URL=${NOTIFICATION_QUEUE_URL},NOTIFICATION_TOPIC_ARN=${NOTIFICATION_TOPIC_ARN}}"

      - name: Verify deployment
        run: |
          aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --query 'Stacks[0].StackStatus' \
            --output text

      - name: Deployment summary
        if: success()
        run: |
          echo "✓ DEPLOYMENT SUCCESSFUL"
          echo "Stack Name: $STACK_NAME"
          echo "Region: $AWS_REGION"
          echo "Environment: $ENVIRONMENT"

      - name: Deployment failed
        if: failure()
        run: |
          echo "✗ DEPLOYMENT FAILED"
          echo "CloudFormation stack events for ${STACK_NAME}:"
          aws cloudformation describe-stack-events \
            --stack-name "${STACK_NAME}" \
            --region "${AWS_REGION}" \
            --query 'StackEvents[?contains(ResourceStatus, `FAILED`) || contains(ResourceStatus, `ROLLBACK`) || contains(ResourceStatus, `CREATE_FAILED`) || contains(ResourceStatus, `DELETE_FAILED`) || contains(ResourceStatus, `UPDATE_ROLLBACK`)].[Timestamp,ResourceStatus,ResourceType,LogicalResourceId,ResourceStatusReason]' \
            --output table || true
          exit 1