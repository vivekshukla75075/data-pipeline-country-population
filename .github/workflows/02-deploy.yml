name: 2. Deploy to AWS

on:
workflow_dispatch:
inputs:
environment:
description: 'Deployment environment'
required: false
default: 'dev'
type: choice
options:
- dev
- staging
- prod
aws_region:
description: 'AWS region'
required: false
default: 'us-east-1'

permissions:
id-token: write        # ✅ REQUIRED for OIDC
contents: read

jobs:
deploy:
name: Deploy Pipeline Infrastructure
runs-on: ubuntu-latest
environment:
name: ${{ github.event.inputs.environment || 'dev' }}

```
env:
  AWS_REGION: ${{ github.event.inputs.aws_region || 'us-east-1' }}
  ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
  STACK_NAME: data-pipeline-orchestration
  NOTIFICATION_EMAIL: ntvs02011999@gmail.com

steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: '3.11'

  - name: Install dependencies
    run: |
      python -m pip install --upgrade pip
      pip install pyyaml boto3

  # ✅ OIDC Authentication (ONLY THIS, no access keys)
  - name: Configure AWS credentials (OIDC)
    uses: aws-actions/configure-aws-credentials@v4
    with:
      role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
      aws-region: ${{ env.AWS_REGION }}

  - name: Validate AWS credentials
    run: aws sts get-caller-identity

  - name: Validate CloudFormation template
    run: |
      aws cloudformation validate-template \
        --template-body file://infra/cloudformation/orchestration.yaml \
        --region "${AWS_REGION}" > /dev/null
      echo "✓ CloudFormation template validated"

  - name: Build Lambda packages
    run: |
      cd lambda_deployment
      rm -f ingest_api_data.zip notify_pipeline_status.zip
      zip -q ingest_api_data.zip ingest_api_data.py ../utils/http_utils.py
      zip -q notify_pipeline_status.zip notify_pipeline_status.py
      ls -lh *.zip
      cd ..
      echo "✓ Lambda packages ready"

  - name: Deploy CloudFormation stack
    run: |
      echo "Deploying stack: $STACK_NAME to region: $AWS_REGION"
      aws cloudformation deploy \
        --template-file infra/cloudformation/orchestration.yaml \
        --stack-name "$STACK_NAME" \
        --parameter-overrides \
          Environment=$ENVIRONMENT \
          NotificationEmail=$NOTIFICATION_EMAIL \
        --capabilities CAPABILITY_NAMED_IAM \
        --region "$AWS_REGION" \
        --no-fail-on-empty-changeset
      echo "✓ CloudFormation stack deployed"

  - name: Get CloudFormation stack outputs
    run: |
      echo "=== Stack Outputs ==="
      aws cloudformation describe-stacks \
        --stack-name "$STACK_NAME" \
        --region "$AWS_REGION" \
        --query 'Stacks[0].Outputs' \
        --output table || echo "No outputs found"

  - name: Deploy ingestion Lambda
    run: |
      cd lambda_deployment
      FUNCTION_NAME="ingest-api-data"
      if aws lambda get-function --function-name "$FUNCTION_NAME" --region "$AWS_REGION" >/dev/null 2>&1; then
        echo "Updating existing Lambda function: $FUNCTION_NAME"
        aws lambda update-function-code \
          --function-name "$FUNCTION_NAME" \
          --zip-file fileb://ingest_api_data.zip \
          --region "$AWS_REGION"
      else
        echo "Lambda function will be created by CloudFormation"
      fi

  - name: Deploy notifier Lambda
    run: |
      cd lambda_deployment
      FUNCTION_NAME="pipeline-status-notifier"
      if aws lambda get-function --function-name "$FUNCTION_NAME" --region "$AWS_REGION" >/dev/null 2>&1; then
        echo "Updating existing Lambda function: $FUNCTION_NAME"
        aws lambda update-function-code \
          --function-name "$FUNCTION_NAME" \
          --zip-file fileb://notify_pipeline_status.zip \
          --region "$AWS_REGION"
      else
        echo "Lambda function will be created by CloudFormation"
      fi

  - name: Verify deployment
    run: |
      aws cloudformation describe-stacks \
        --stack-name "$STACK_NAME" \
        --region "$AWS_REGION" \
        --query 'Stacks[0].StackStatus' \
        --output text

  - name: Deployment summary
    if: success()
    run: |
      echo "✓ DEPLOYMENT SUCCESSFUL"
      echo "Stack Name: $STACK_NAME"
      echo "Region: $AWS_REGION"
      echo "Environment: $ENVIRONMENT"

  - name: Deployment failed
    if: failure()
    run: |
      echo "✗ DEPLOYMENT FAILED"
      echo "Check CloudFormation stack events"
      exit 1
```
