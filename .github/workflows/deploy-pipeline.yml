name: Deploy Data Pipeline

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1
      ENVIRONMENT: dev
      STACK_NAME: data-pipeline-orchestration
      NOTIFICATION_LAMBDA_NAME: pipeline-status-notifier
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml boto3

      - name: Validate Python syntax
        run: |
          python -m py_compile lambda_deployment/ingest_api_data.py lambda_deployment/notify_pipeline_status.py

      - name: Configure AWS credentials
        if: ${{ env.AWS_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials from secrets
        if: ${{ env.AWS_ROLE_ARN == '' }}
        run: |
          echo "AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=${AWS_REGION}" >> $GITHUB_ENV

      - name: Validate CloudFormation template
        run: |
          aws cloudformation validate-template \
            --template-body file://infra/cloudformation/orchestration.yaml \
            --region "${AWS_REGION}" > /dev/null && echo "CloudFormation template is valid"

      - name: Package notifier Lambda
        run: |
          cd lambda_deployment
          rm -f notify_pipeline_status.zip
          zip -r notify_pipeline_status.zip notify_pipeline_status.py

      - name: Deploy orchestration stack
        run: |
          aws cloudformation deploy \
            --template-file infra/cloudformation/orchestration.yaml \
            --stack-name "$STACK_NAME" \
            --parameter-overrides Environment=$ENVIRONMENT NotificationEmail=ntvs02011999@gmail.com \
            --capabilities CAPABILITY_NAMED_IAM \
            --region "$AWS_REGION"

      - name: Deploy notifier Lambda
        run: |
          aws lambda get-function --function-name "$NOTIFICATION_LAMBDA_NAME" --region "$AWS_REGION" >/dev/null 2>&1 || \
          aws lambda create-function \
            --function-name "$NOTIFICATION_LAMBDA_NAME" \
            --runtime python3.11 \
            --role "arn:aws:iam::${AWS_ACCOUNT_ID:-$(aws sts get-caller-identity --query Account --output text)}:role/data-pipeline-notifier-role-$ENVIRONMENT" \
            --handler notify_pipeline_status.lambda_handler \
            --zip-file fileb://lambda_deployment/notify_pipeline_status.zip \
            --region "$AWS_REGION" >/dev/null

          aws lambda update-function-code \
            --function-name "$NOTIFICATION_LAMBDA_NAME" \
            --zip-file fileb://lambda_deployment/notify_pipeline_status.zip \
            --region "$AWS_REGION" >/dev/null

      - name: Deploy ingestion Lambda (if exists)
        run: |
          cd lambda_deployment
          rm -f ingest_api_data.zip
          zip -r ingest_api_data.zip ingest_api_data.py
          aws lambda get-function --function-name ingest-api-data --region "$AWS_REGION" >/dev/null 2>&1 || true
          aws lambda update-function-code --function-name ingest-api-data --zip-file fileb://lambda_deployment/ingest_api_data.zip --region "$AWS_REGION" >/dev/null || true
