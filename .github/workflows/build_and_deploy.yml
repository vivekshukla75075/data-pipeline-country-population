name: Build and Deploy ETL Pipeline

on:
  push:
    branches:
      - feature/sync-upstream-changes
      - main
      - master
  pull_request:
    branches:
      - main
      - master

env:
  AWS_REGION: us-east-1
  S3_BUCKET: data-pipeline-country-population

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3 requests

      - name: Validate Python syntax
        run: |
          python -m py_compile lambda_deployment/ingest_api_data.py
          python -m py_compile Validation/validate_schema.py
          python -m py_compile Transformation/transform_data.py

      - name: Build Lambda package
        run: |
          cd lambda_deployment
          rm -f ingest_api_data.zip
          zip -q ingest_api_data.zip ingest_api_data.py
          ls -lh ingest_api_data.zip
          cd ..
          echo "✓ Lambda ZIP created"

      - name: Upload Lambda artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-deployment
          path: lambda_deployment/ingest_api_data.zip
          retention-days: 1

  deploy:
    name: Deploy to AWS
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/feature/sync-upstream-changes'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3

      - name: Download Lambda artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-deployment
          path: lambda_deployment

      - name: Verify Lambda artifact
        run: |
          echo "Verifying Lambda artifact..."
          ls -lh lambda_deployment/ingest_api_data.zip
          unzip -l lambda_deployment/ingest_api_data.zip

      - name: Create Lambda function if not exists
        run: |
          echo "Checking if Lambda function exists..."
          FUNCTION_EXISTS=$(aws lambda get-function --function-name ingest-api-data --region ${{ env.AWS_REGION }} 2>/dev/null || echo "")
          
          if [ -z "$FUNCTION_EXISTS" ]; then
            echo "Lambda function not found. Creating it..."
            ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
            ROLE_NAME="lambda-execution-role"
            ROLE_EXISTS=$(aws iam get-role --role-name $ROLE_NAME 2>/dev/null || echo "")
            
            if [ -z "$ROLE_EXISTS" ]; then
              echo "Creating IAM role..."
              aws iam create-role --role-name $ROLE_NAME --assume-role-policy-document '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":{"Service":"lambda.amazonaws.com"},"Action":"sts:AssumeRole"}]}'
              sleep 2
              aws iam put-role-policy --role-name $ROLE_NAME --policy-name S3AccessPolicy --policy-document '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Action":["s3:GetObject","s3:PutObject","s3:DeleteObject","s3:ListBucket"],"Resource":["arn:aws:s3:::${{ env.S3_BUCKET }}/*","arn:aws:s3:::${{ env.S3_BUCKET }}"]}]}'
              aws iam attach-role-policy --role-name $ROLE_NAME --policy-arn arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
            fi
            
            sleep 5
            ROLE_ARN="arn:aws:iam::${ACCOUNT_ID}:role/${ROLE_NAME}"
            aws lambda create-function --function-name ingest-api-data --runtime python3.9 --role $ROLE_ARN --handler ingest_api_data.lambda_handler --zip-file fileb://lambda_deployment/ingest_api_data.zip --timeout 60 --memory-size 256 --region ${{ env.AWS_REGION }}
          else
            echo "✓ Lambda function already exists"
          fi

      - name: Wait for Lambda to be ready
        run: |
          echo "Waiting for Lambda function to be ready..."
          for i in {1..30}; do
            STATE=$(aws lambda get-function --function-name ingest-api-data --region ${{ env.AWS_REGION }} --query 'Configuration.State' --output text 2>/dev/null || echo "Creating")
            if [ "$STATE" = "Active" ]; then
              echo "✓ Lambda is ready"
              break
            fi
            echo "Lambda state: $STATE (attempt $i/30)"
            sleep 2
          done

      - name: Deploy Lambda function code
        run: |
          echo "Deploying Lambda function code..."
          aws lambda update-function-code --function-name ingest-api-data --zip-file fileb://lambda_deployment/ingest_api_data.zip --region ${{ env.AWS_REGION }}
          echo "✓ Lambda deployed"

      - name: Upload Glue scripts to S3
        run: |
          echo "Uploading Glue scripts to S3..."
          aws s3 cp Validation/validate_schema.py s3://${{ env.S3_BUCKET }}/scripts/ --region ${{ env.AWS_REGION }}
          aws s3 cp Transformation/transform_data.py s3://${{ env.S3_BUCKET }}/scripts/ --region ${{ env.AWS_REGION }}
          echo "✓ Glue scripts uploaded"

      - name: Update Glue jobs
        run: |
          python3 << 'EOF'
          import boto3
          
          glue = boto3.client('glue', region_name='${{ env.AWS_REGION }}')
          sts = boto3.client('sts')
          
          account_id = sts.get_caller_identity()['Account']
          role_arn = f'arn:aws:iam::{account_id}:role/glue-validation-role'
          
          print("Updating Glue Validation job...")
          glue.update_job(
              Name='country-population-validation',
              JobUpdate={
                  'Command': {'Name': 'glueetl', 'ScriptLocation': 's3://${{ env.S3_BUCKET }}/scripts/validate_schema.py'},
                  'Role': role_arn,
                  'GlueVersion': '3.0',
                  'WorkerType': 'G.1X',
                  'NumberOfWorkers': 3
              }
          )
          print("✓ Validation job updated")
          
          print("Updating Glue Transformation job...")
          glue.update_job(
              Name='country-population-transformation',
              JobUpdate={
                  'Command': {'Name': 'glueetl', 'ScriptLocation': 's3://${{ env.S3_BUCKET }}/scripts/transform_data.py'},
                  'Role': role_arn,
                  'GlueVersion': '3.0',
                  'WorkerType': 'G.1X',
                  'NumberOfWorkers': 5
              }
          )
          print("✓ Transformation job updated")
          EOF

      - name: Test Lambda execution
        run: |
          echo "Testing Lambda execution..."
          aws lambda invoke --function-name ingest-api-data --region ${{ env.AWS_REGION }} /tmp/lambda_response.json
          cat /tmp/lambda_response.json | python3 -m json.tool
          STATUS=$(python3 -c "import json; print(json.load(open('/tmp/lambda_response.json')).get('statusCode'))")
          [ "$STATUS" = "200" ] && echo "✓ Lambda execution successful" || exit 1

      - name: Deployment summary
        run: |
          echo ""
          echo "========== DEPLOYMENT SUMMARY =========="
          echo "✅ Lambda function: ingest-api-data"
          echo "✅ Glue job: country-population-validation"
          echo "✅ Glue job: country-population-transformation"
          echo "✅ Scripts: Uploaded to S3"
          echo ""
          echo "Pipeline is ready for execution!"
          echo "=========================================="