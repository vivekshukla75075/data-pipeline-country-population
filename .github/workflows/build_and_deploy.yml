name: Build and Deploy ETL Pipeline

on:
  push:
    branches:
      - feature/sync-upstream-changes
      - main
      - master
  pull_request:
    branches:
      - main
      - master

env:
  AWS_REGION: us-east-1
  S3_BUCKET: data-pipeline-country-population

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3 requests

      - name: Validate Python syntax
        run: |
          python -m py_compile lambda_deployment/ingest_api_data.py
          python -m py_compile Validation/validate_schema.py
          python -m py_compile Transformation/transform_data.py

      - name: Build Lambda package
        run: |
          cd lambda_deployment
          rm -f ingest_api_data.zip
          zip -q ingest_api_data.zip ingest_api_data.py
          ls -lh ingest_api_data.zip
          cd ..
          echo "✓ Lambda ZIP created"

      - name: Upload Lambda artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-deployment
          path: lambda_deployment/ingest_api_data.zip
          retention-days: 1

  deploy:
    name: Deploy to AWS
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/feature/sync-upstream-changes'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download Lambda artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-deployment
          path: lambda_deployment

      - name: Verify Lambda artifact
        run: |
          echo "Verifying Lambda artifact..."
          ls -lh lambda_deployment/ingest_api_data.zip
          unzip -l lambda_deployment/ingest_api_data.zip

      - name: Create Lambda function if not exists
        run: |
          echo "Checking if Lambda function exists..."
          FUNCTION_EXISTS=$(aws lambda get-function --function-name ingest-api-data --region ${{ env.AWS_REGION }} 2>/dev/null || echo "")
          
          if [ -z "$FUNCTION_EXISTS" ]; then
            echo "Lambda function not found. Creating it..."
            
            # Get Account ID
            ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
            ROLE_NAME="lambda-execution-role"
            
            # Check if role exists
            ROLE_EXISTS=$(aws iam get-role --role-name $ROLE_NAME 2>/dev/null || echo "")
            
            if [ -z "$ROLE_EXISTS" ]; then
              echo "Creating IAM role: $ROLE_NAME"
              aws iam create-role \
                --role-name $ROLE_NAME \
                --assume-role-policy-document '{
                  "Version": "2012-10-17",
                  "Statement": [
                    {
                      "Effect": "Allow",
                      "Principal": {"Service": "lambda.amazonaws.com"},
                      "Action": "sts:AssumeRole"
                    }
                  ]
                }'
              
              # Wait for role to be available
              sleep 2
              
              # Attach S3 policy
              echo "Attaching S3 policy to role..."
              aws iam put-role-policy \
                --role-name $ROLE_NAME \
                --policy-name S3AccessPolicy \
                --policy-document '{
                  "Version": "2012-10-17",
                  "Statement": [
                    {
                      "Effect": "Allow",
                      "Action": ["s3:GetObject", "s3:PutObject", "s3:DeleteObject", "s3:ListBucket"],
                      "Resource": ["arn:aws:s3:::${{ env.S3_BUCKET }}/*", "arn:aws:s3:::${{ env.S3_BUCKET }}"]
                    }
                  ]
                }'
              
              # Attach basic Lambda execution policy
              echo "Attaching basic Lambda execution policy..."
              aws iam attach-role-policy \
                --role-name $ROLE_NAME \
                --policy-arn arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
            else
              echo "Role already exists: $ROLE_NAME"
            fi
            
            # Wait for permissions to propagate
            sleep 5
            
            # Create Lambda function
            echo "Creating Lambda function: ingest-api-data"
            ROLE_ARN="arn:aws:iam::${ACCOUNT_ID}:role/${ROLE_NAME}"
            
            aws lambda create-function \
              --function-name ingest-api-data \
              --runtime python3.9 \
              --role $ROLE_ARN \
              --handler ingest_api_data.lambda_handler \
              --zip-file fileb://lambda_deployment/ingest_api_data.zip \
              --timeout 60 \
              --memory-size 256 \
              --region ${{ env.AWS_REGION }}
            
            echo "Lambda function created, waiting for it to be ready..."
            # Wait for Lambda to be ready
            RETRY_COUNT=0
            MAX_RETRIES=30
          
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              STATE=$(aws lambda get-function \
                --function-name ingest-api-data \
                --region ${{ env.AWS_REGION }} \
                --query 'Configuration.State' \
                --output text 2>/dev/null || echo "Creating")
              
              if [ "$STATE" = "Active" ]; then
                echo "✓ Lambda function is ready (State: $STATE)"
                break
              else
                echo "Lambda state: $STATE (retry $((RETRY_COUNT + 1))/$MAX_RETRIES)"
                sleep 2
                RETRY_COUNT=$((RETRY_COUNT + 1))
              fi
            done
            
            if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
              echo "✗ Lambda function did not become ready in time"
              exit 1
            fi

          else
            echo "✓ Lambda function already exists"
          fi

      - name: Deploy Lambda function code
        run: |
          echo "Deploying Lambda function code..."
          aws lambda update-function-code \
            --function-name ingest-api-data \
            --zip-file fileb://lambda_deployment/ingest_api_data.zip \
            --region ${{ env.AWS_REGION }}
          echo "✓ Lambda deployed"

      - name: Verify Lambda deployment
        run: |
          echo "Verifying Lambda deployment..."
          LAST_MODIFIED=$(aws lambda get-function \
            --function-name ingest-api-data \
            --region ${{ env.AWS_REGION }} \
            --query 'Configuration.LastModified' \
            --output text)
          CODE_SIZE=$(aws lambda get-function \
            --function-name ingest-api-data \
            --region ${{ env.AWS_REGION }} \
            --query 'Configuration.CodeSize' \
            --output text)
          echo "Lambda Last Modified: $LAST_MODIFIED"
          echo "Lambda Code Size: $CODE_SIZE bytes"
          echo "✓ Lambda deployment verified"

      - name: Upload Glue scripts to S3
        run: |
          echo "Uploading Glue scripts to S3..."
          aws s3 cp Validation/validate_schema.py s3://${{ env.S3_BUCKET }}/scripts/ --region ${{ env.AWS_REGION }}
          aws s3 cp Transformation/transform_data.py s3://${{ env.S3_BUCKET }}/scripts/ --region ${{ env.AWS_REGION }}
          echo "✓ Glue scripts uploaded"

      - name: Update Glue Validation job
        run: |
          echo "Updating Glue Validation job..."
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          
          cat > /tmp/validation_update.json << EOF
          {
            "Command": {
              "Name": "glueetl",
              "ScriptLocation": "s3://${{ env.S3_BUCKET }}/scripts/validate_schema.py"
            },
            "Role": "arn:aws:iam::${ACCOUNT_ID}:role/glue-validation-role",
            "GlueVersion": "3.0",
            "WorkerType": "G.1X",
            "NumberOfWorkers": 3
          }
          EOF
          
          aws glue update-job \
            --name country-population-validation \
            --job-update file:///tmp/validation_update.json \
            --region ${{ env.AWS_REGION }}
          
          echo "✓ Validation job updated"

      - name: Update Glue Transformation job
        run: |
          echo "Updating Glue Transformation job..."
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          
          cat > /tmp/transformation_update.json << EOF
          {
            "Command": {
              "Name": "glueetl",
              "ScriptLocation": "s3://${{ env.S3_BUCKET }}/scripts/transform_data.py"
            },
            "Role": "arn:aws:iam::${ACCOUNT_ID}:role/glue-validation-role",
            "GlueVersion": "3.0",
            "WorkerType": "G.1X",
            "NumberOfWorkers": 5
          }
          EOF
          
          aws glue update-job \
            --name country-population-transformation \
            --job-update file:///tmp/transformation_update.json \
            --region ${{ env.AWS_REGION }}
          
          echo "✓ Transformation job updated"

      - name: Test Lambda execution
        run: |
          echo "Testing Lambda execution..."
          aws lambda invoke \
            --function-name ingest-api-data \
            --region ${{ env.AWS_REGION }} \
            /tmp/lambda_response.json
          
          cat /tmp/lambda_response.json | jq '.'
          
          STATUS=$(cat /tmp/lambda_response.json | jq -r '.statusCode')
          echo "Lambda Status Code: $STATUS"
          
          if [ "$STATUS" = "200" ]; then
            echo "✓ Lambda execution successful"
          else
            echo "✗ Lambda execution failed"
            exit 1
          fi

      - name: Verify S3 deployment
        run: |
          echo "Verifying S3 deployment..."
          
          echo ""
          echo "Glue scripts:"
          aws s3 ls s3://${{ env.S3_BUCKET }}/scripts/ --region ${{ env.AWS_REGION }}
          
          echo ""
          echo "Raw data:"
          aws s3 ls s3://${{ env.S3_BUCKET }}/raw/countries/ --region ${{ env.AWS_REGION }} --recursive || echo "(will be created by Lambda)"
          
          echo ""
          echo "Ingestion logs:"
          aws s3 ls s3://${{ env.S3_BUCKET }}/logs/ingestion_logs/ --region ${{ env.AWS_REGION }} --recursive || echo "(will appear after execution)"

      - name: Deployment summary
        run: |
          echo ""
          echo "========== DEPLOYMENT SUMMARY =========="
          echo "✅ Lambda function: ingest-api-data"
          echo "✅ Glue job: country-population-validation"
          echo "✅ Glue job: country-population-transformation"
          echo "✅ Scripts: Uploaded to S3"
          echo ""
          echo "Pipeline Components:"
          echo "  1. Lambda (Ingestion) - DEPLOYED"
          echo "  2. Glue Validation - DEPLOYED"
          echo "  3. Glue Transformation - DEPLOYED"
          echo ""
          echo "Log Locations:"
          echo "  - s3://data-pipeline-country-population/logs/ingestion_logs/"
          echo "  - s3://data-pipeline-country-population/logs/validation_logs/"
          echo "  - s3://data-pipeline-country-population/logs/transformation_logs/"
          echo ""
          echo "=========================================="
