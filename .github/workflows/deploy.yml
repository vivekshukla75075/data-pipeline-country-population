name: Build and Deploy to AWS

on:
  push:
    branches:
      - feature/sync-upstream-changes
      - main
      - master

env:
  AWS_REGION: us-east-1
  S3_BUCKET: data-pipeline-country-population

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.9

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          cd Validation && pytest test_validate_schema.py -v --tb=short

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/feature/sync-upstream-changes'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify S3 bucket exists
        run: |
          aws s3api head-bucket --bucket ${{ env.S3_BUCKET }} 2>/dev/null && \
          echo "✓ S3 bucket exists" || \
          (echo "❌ S3 bucket does not exist" && exit 1)

      - name: Upload scripts to S3
        run: |
          aws s3 cp src/ingestion/ingest_data.py s3://${{ env.S3_BUCKET }}/scripts/
          aws s3 cp src/validation/validate_schema.py s3://${{ env.S3_BUCKET }}/scripts/
          aws s3 cp src/transformation/transform_data.py s3://${{ env.S3_BUCKET }}/scripts/
          echo "✓ All scripts uploaded to S3"

      - name: Install AWS CLI and dependencies
        run: |
          pip install awscli

      - name: Run automated deployment
        run: |
          chmod +x infrastructure/scripts/deploy_pipeline.sh
          ./infrastructure/scripts/deploy_pipeline.sh

      - name: Verify deployment
        run: |
          echo "Verifying deployment..."
          aws glue list-jobs --region ${{ env.AWS_REGION }} | grep -q "country-population" && \
          echo "✓ Glue jobs created successfully" || \
          echo "⚠️ Warning: Could not verify Glue jobs"
          
          aws lambda list-functions --region ${{ env.AWS_REGION }} | grep -q "trigger-ingestion" && \
          echo "✓ Lambda functions created successfully" || \
          echo "⚠️ Warning: Could not verify Lambda functions"
          
          aws stepfunctions list-state-machines --region ${{ env.AWS_REGION }} | grep -q "country-population" && \
          echo "✓ Step Functions created successfully" || \
          echo "⚠️ Warning: Could not verify Step Functions"

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Deployment completed successfully!"
          echo ""
          echo "Pipeline is ready. To trigger execution:"
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "aws stepfunctions start-execution \"
          echo "  --state-machine-arn arn:aws:states:${{ env.AWS_REGION }}:$ACCOUNT_ID:stateMachine:country-population-etl-pipeline \"
          echo "  --input '{}'"
