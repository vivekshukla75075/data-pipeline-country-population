name: Build and Deploy to AWS

on:
  push:
    branches:
      - feature/sync-upstream-changes
      - main
      - master

env:
  AWS_REGION: us-east-1
  S3_BUCKET: data-pipeline-country-population

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.9

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          cd Validation && pytest test_validate_schema.py -v --tb=short

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/feature/sync-upstream-changes'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify S3 bucket exists
        run: |
          aws s3api head-bucket --bucket ${{ env.S3_BUCKET }} 2>/dev/null && \
          echo "✓ S3 bucket exists" || \
          (echo "Creating S3 bucket..." && aws s3api create-bucket --bucket ${{ env.S3_BUCKET }} --region ${{ env.AWS_REGION }} && echo "✓ S3 bucket created")

      - name: Upload scripts to S3
        run: |
          echo "Uploading ingestion script..."
          if [ -f "Ingestion/ingest_data.py" ]; then
            aws s3 cp Ingestion/ingest_data.py s3://${{ env.S3_BUCKET }}/scripts/ingest_data.py
            echo "✓ Ingestion script uploaded"
          fi
          
          echo "Uploading validation script..."
          if [ -f "Validation/validate_schema.py" ]; then
            aws s3 cp Validation/validate_schema.py s3://${{ env.S3_BUCKET }}/scripts/validate_schema.py
            echo "✓ Validation script uploaded"
          fi
          
          echo "Uploading transformation script..."
          if [ -f "Transformation/transform_data.py" ]; then
            aws s3 cp Transformation/transform_data.py s3://${{ env.S3_BUCKET }}/scripts/transform_data.py
            echo "✓ Transformation script uploaded"
          fi
          
          echo "Uploading policies..."
          if [ -f "infra/iam/s3_access_policy.json" ]; then
            aws s3 cp infra/iam/s3_access_policy.json s3://${{ env.S3_BUCKET }}/policies/s3_access_policy.json
            echo "✓ Policies uploaded"
          fi

      - name: Install AWS CLI
        run: |
          pip install awscli

      - name: Run automated deployment
        run: |
          if [ -f "infrastructure/scripts/deploy_pipeline.sh" ]; then
            chmod +x infrastructure/scripts/deploy_pipeline.sh
            ./infrastructure/scripts/deploy_pipeline.sh
          else
            echo "⚠️ Deployment script not found at infrastructure/scripts/deploy_pipeline.sh"
          fi

      - name: Verify deployment
        run: |
          echo "Verifying deployment..."
          
          echo "Checking Glue jobs..."
          aws glue list-jobs --region ${{ env.AWS_REGION }} 2>/dev/null | grep -q "country-population" && \
          echo "✓ Glue jobs exist" || \
          echo "⚠️ Glue jobs not found"
          
          echo "Checking Lambda functions..."
          aws lambda list-functions --region ${{ env.AWS_REGION }} 2>/dev/null | grep -q "trigger-ingestion" && \
          echo "✓ Lambda functions exist" || \
          echo "⚠️ Lambda functions not found"
          
          echo "Checking Step Functions..."
          aws stepfunctions list-state-machines --region ${{ env.AWS_REGION }} 2>/dev/null | grep -q "country-population" && \
          echo "✓ Step Functions exist" || \
          echo "⚠️ Step Functions not found"

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Deployment completed successfully!"
          echo ""
          echo "ETL Pipeline Setup Complete"
          echo "============================"
          echo ""
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "To trigger the pipeline manually, run:"
          echo ""
          echo "aws stepfunctions start-execution \\"
          echo "  --state-machine-arn arn:aws:states:${{ env.AWS_REGION }}:$ACCOUNT_ID:stateMachine:country-population-etl-pipeline \\"
          echo "  --input '{}'"
