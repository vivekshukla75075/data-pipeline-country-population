name: Build and Deploy to AWS

on:
  push:
    branches:
      - feature/sync-upstream-changes
      - main
      - master
  pull_request:
    branches:
      - main
      - master

env:
  AWS_REGION: us-east-1
  S3_BUCKET: data-pipeline-bucket
  ENVIRONMENT: dev

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.9

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linting (optional)
        continue-on-error: true
        run: |
          pip install flake8
          flake8 Validation/validate_schema.py --count --select=E9,F63,F7,F82 --show-source --statistics || true

      - name: Run unit tests
        run: |
          cd Validation && pytest test_validate_schema.py -v --tb=short

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/feature/sync-upstream-changes'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.9

      - name: Install AWS CLI
        run: |
          python -m pip install --upgrade pip boto3

      - name: Create S3 bucket
        id: create-bucket
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET_NAME="${{ env.S3_BUCKET }}-${ACCOUNT_ID}-${{ env.ENVIRONMENT }}"
          echo "bucket_name=$BUCKET_NAME" >> $GITHUB_OUTPUT
          
          if aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
            echo "✓ S3 bucket already exists: $BUCKET_NAME"
          else
            echo "Creating S3 bucket: $BUCKET_NAME"
            aws s3api create-bucket \
              --bucket "$BUCKET_NAME" \
              --region ${{ env.AWS_REGION }}
            echo "✓ S3 bucket created: $BUCKET_NAME"
          fi

      - name: Enable bucket versioning
        run: |
          aws s3api put-bucket-versioning \
            --bucket ${{ steps.create-bucket.outputs.bucket_name }} \
            --versioning-configuration Status=Enabled
          echo "✓ Bucket versioning enabled"

      - name: Create IAM role for Glue
        run: |
          ROLE_NAME="glue-validation-role"
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          
          # Check if role exists
          if aws iam get-role --role-name "$ROLE_NAME" 2>/dev/null; then
            echo "✓ IAM role already exists: $ROLE_NAME"
          else
            echo "Creating IAM role: $ROLE_NAME"
            
            # Create trust policy for Glue
            cat > /tmp/trust-policy.json <<EOF
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Principal": {
                  "Service": "glue.amazonaws.com"
                },
                "Action": "sts:AssumeRole"
              }
            ]
          }
          EOF
            
            aws iam create-role \
              --role-name "$ROLE_NAME" \
              --assume-role-policy-document file:///tmp/trust-policy.json
            
            echo "✓ IAM role created: $ROLE_NAME"
          fi

      - name: Attach S3 policy to role
        run: |
          ROLE_NAME="glue-validation-role"
          BUCKET_NAME=${{ steps.create-bucket.outputs.bucket_name }}
          
          # Create inline policy for S3 access
          cat > /tmp/s3-policy.json <<EOF
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Action": [
                  "s3:GetObject",
                  "s3:PutObject",
                  "s3:DeleteObject",
                  "s3:ListBucket"
                ],
                "Resource": [
                  "arn:aws:s3:::${BUCKET_NAME}",
                  "arn:aws:s3:::${BUCKET_NAME}/*"
                ]
              }
            ]
          }
          EOF
          
          aws iam put-role-policy \
            --role-name "$ROLE_NAME" \
            --policy-name "S3AccessPolicy" \
            --policy-document file:///tmp/s3-policy.json
          
          echo "✓ S3 access policy attached to role"

      - name: Deploy scripts to S3
        run: |
          BUCKET_NAME=${{ steps.create-bucket.outputs.bucket_name }}
          
          echo "Uploading validation script..."
          aws s3 cp Validation/validate_schema.py s3://${BUCKET_NAME}/scripts/validate_schema.py
          
          echo "Uploading transformation script..."
          aws s3 cp Transformation/transform_data.py s3://${BUCKET_NAME}/scripts/transform_data.py
          
          echo "Uploading IAM policies..."
          aws s3 cp infra/iam/s3_access_policy.json s3://${BUCKET_NAME}/policies/s3_access_policy.json
          
          echo "✓ All scripts deployed to S3"

      - name: List deployed files
        run: |
          BUCKET_NAME=${{ steps.create-bucket.outputs.bucket_name }}
          echo "Files in S3 bucket: $BUCKET_NAME"
          aws s3 ls s3://${BUCKET_NAME}/ --recursive

      - name: Verify bucket and role
        run: |
          BUCKET_NAME=${{ steps.create-bucket.outputs.bucket_name }}
          ROLE_NAME="glue-validation-role"
          
          echo "Verifying S3 bucket..."
          aws s3api head-bucket --bucket ${BUCKET_NAME}
          echo "✓ S3 bucket verified"
          
          echo "Verifying IAM role..."
          aws iam get-role --role-name ${ROLE_NAME}
          echo "✓ IAM role verified"

      - name: Notify deployment success
        if: success()
        run: |
          BUCKET_NAME=${{ steps.create-bucket.outputs.bucket_name }}
          echo "✅ Deployment to AWS successful!"
          echo "Bucket: $BUCKET_NAME"
          echo "Region: ${{ env.AWS_REGION }}"
          echo "Scripts uploaded to: s3://$BUCKET_NAME/scripts/"
