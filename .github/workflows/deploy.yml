name: Build and Deploy to AWS

on:
  push:
    branches:
      - feature/sync-upstream-changes
      - main
      - master
  pull_request:
    branches:
      - main
      - master

env:
  AWS_REGION: us-east-1
  S3_BUCKET: data-pipeline-country-population

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.9

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          cd Validation && pytest test_validate_schema.py -v --tb=short

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        run: terraform -chdir=infra/terraform init

      - name: Terraform Apply
        run: terraform -chdir=infra/terraform apply -auto-approve

      - name: Deploy ingestion script to S3
        run: |
          aws s3 cp Ingestion/ingest_data.py s3://${{ env.S3_BUCKET }}/scripts/ingest_data.py

      - name: Deploy validation script to S3
        run: |
          aws s3 cp Validation/validate_schema.py s3://${{ env.S3_BUCKET }}/scripts/validate_schema.py

      - name: Deploy transformation script to S3
        run: |
          aws s3 cp Transformation/transform_data.py s3://${{ env.S3_BUCKET }}/scripts/transform_data.py

      - name: Deploy IAM policies to S3
        run: |
          aws s3 cp infra/iam/s3_access_policy.json s3://${{ env.S3_BUCKET }}/policies/s3_access_policy.json

      - name: List deployed files
        run: |
          aws s3 ls s3://${{ env.S3_BUCKET }}/ --recursive

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Deployment to AWS successful!"
          echo "Bucket: ${{ env.S3_BUCKET }}"
          echo "Region: ${{ env.AWS_REGION }}"
