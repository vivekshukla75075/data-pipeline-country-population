name: 1. Bootstrap OIDC Role

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment suffix"
        required: false
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod
      aws_region:
        description: "AWS region"
        required: false
        default: "us-east-1"

permissions:
  contents: read

env:
  AWS_REGION: ${{ github.event.inputs.aws_region || 'us-east-1' }}
  ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
  STACK_NAME: data-pipeline-github-actions-role-${{ github.event.inputs.environment || 'dev' }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate AWS credentials
        run: aws sts get-caller-identity

      - name: Deploy bootstrap stack
        run: |
          aws cloudformation deploy \
            --template-file infra/cloudformation/github-actions-deploy-role.yaml \
            --stack-name "${STACK_NAME}" \
            --parameter-overrides Environment="${ENVIRONMENT}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --region "${AWS_REGION}" \
            --no-fail-on-empty-changeset

      - name: Output role ARN
        run: |
          aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --region "${AWS_REGION}" \
            --query "Stacks[0].Outputs[?OutputKey=='DeployRoleArn'].OutputValue | [0]" \
            --output text