AWSTemplateFormatVersion: '2010-09-09'
Description: 'Create GitHub Actions OIDC provider and deploy role for pipeline CI/CD'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment suffix for role name

Resources:
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1

  GitHubActionsDeployRole:
    Type: AWS::IAM::Role
    DependsOn: GitHubOIDCProvider
    Properties:
      RoleName: !Sub 'data-pipeline-github-actions-deploy-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub 'arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com'
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub 'repo:vivekshukla75075/data-pipeline-country-population:*'
      Policies:
        - PolicyName: GitHubActionsDeployPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:ValidateTemplate
                  - cloudformation:ListStacks
                  - cloudformation:GetTemplate
                  - iam:PassRole
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:DeleteObject
                  - lambda:CreateFunction
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                  - lambda:DeleteFunction
                  - lambda:GetFunction
                  - states:CreateStateMachine
                  - states:UpdateStateMachine
                  - states:DeleteStateMachine
                  - states:StartExecution
                  - events:PutRule
                  - events:PutTargets
                  - sns:CreateTopic
                  - sns:Publish
                  - sqs:CreateQueue
                  - sqs:SendMessage
                  - glue:CreateJob
                  - glue:StartJobRun
                  - logs:CreateLogGroup
                  - logs:PutLogEvents
                Resource: '*'

Outputs:
  DeployRoleArn:
    Description: ARN of the GitHub Actions deploy role
    Value: !GetAtt GitHubActionsDeployRole.Arn
